name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.2.0)'
        required: true
        type: string
      build_macos_x86_64:
        description: 'Build for macOS x86_64 (Intel)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    strategy:
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: bit-pop-x86_64-linux.tar.gz
            command: cargo build --release

          - name: Windows x86_64
            os: windows-latest
            target: x86_64-pc-windows-gnu
            artifact: bit-pop-x86_64-windows.zip
            command: cargo build --release

          - name: macOS aarch64
            os: ubuntu-latest
            target: aarch64-apple-darwin
            artifact: bit-pop-aarch64-macos.tar.gz
            command: cross build --release

          - name: macOS x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            artifact: bit-pop-x86_64-macos.tar.gz
            command: cargo build --release
            include_x86_64: true

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross (macOS aarch64)
        if: matrix.target == 'aarch64-apple-darwin'
        uses: taiki-e/install-action@cross

      - name: Build release
        run: ${{ matrix.command }}

      - name: Strip binary (Unix)
        if: matrix.os != 'windows-latest'
        run: strip target/release/bit-pop 2>/dev/null || true

      - name: Strip binary (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          if (Get-Command strip -ErrorAction SilentlyContinue) {
            strip target/release/bit-pop.exe
          }

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p package
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/release/bit-pop.exe package/
            cd package
            Compress-Archive -Path * -DestinationPath "../${{ matrix.artifact }}"
          else
            cp target/release/bit-pop package/
            cd package
            tar czf "../${{ matrix.artifact }}" .
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 5

  update-formula:
    name: Update Homebrew formula
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          repository: mladenpop-oss/homebrew-bit-pop
          ref: main
          token: ${{ secrets.TAP_PAT }}

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Compute SHA256 checksums
        run: |
          AARCH64_MACOS=$(sha256sum bit-pop-aarch64-macos/bit-pop-aarch64-macos.tar.gz 2>/dev/null | awk '{print $1}' || echo "")
          X86_64_MACOS=$(sha256sum bit-pop-x86_64-macos/bit-pop-x86_64-macos.tar.gz 2>/dev/null | awk '{print $1}' || echo "")
          X86_64_LINUX=$(sha256sum bit-pop-x86_64-linux/bit-pop-x86_64-linux.tar.gz 2>/dev/null | awk '{print $1}' || echo "")

          echo "AARCH64_MACOS=$AARCH64_MACOS" >> $GITHUB_ENV
          echo "X86_64_MACOS=$X86_64_MACOS" >> $GITHUB_ENV
          echo "X86_64_LINUX=$X86_64_LINUX" >> $GITHUB_ENV

          echo "aarch64_macos: $AARCH64_MACOS"
          echo "x86_64_macos: $X86_64_MACOS"
          echo "x86_64_linux: $X86_64_LINUX"

      - name: Update formula
        run: |
          VERSION="${{ github.event.inputs.version }}"
          cat > bit-pop.rb << 'FORMULA'
          class BitPop < Formula
            desc "Ultra-fast multi-genome DNA read classification"
            homepage "https://github.com/mladenpop-oss/bit-pop"

            version "VERSION_PLACEHOLDER"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/mladenpop-oss/bit-pop/releases/download/vVERSION_PLACEHOLDER/bit-pop-aarch64-macos.tar.gz"
                sha256 "AARCH64_PLACEHOLDER"
              else
                url "https://github.com/mladenpop-oss/bit-pop/releases/download/vVERSION_PLACEHOLDER/bit-pop-x86_64-macos.tar.gz"
                sha256 "X86_64_MACOS_PLACEHOLDER"
              end
            end

            on_linux do
              url "https://github.com/mladenpop-oss/bit-pop/releases/download/vVERSION_PLACEHOLDER/bit-pop-x86_64-linux.tar.gz"
              sha256 "X86_64_LINUX_PLACEHOLDER"
            end

            def install
              bin.install "bit-pop" => "bit-pop"
            end

            test do
              assert_match /Bit-Pop/, shell_output("#{bin}/bit-pop --help")
            end
          end
          FORMULA

          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/g" bit-pop.rb
          sed -i "s/AARCH64_PLACEHOLDER/${AARCH64_MACOS}/g" bit-pop.rb
          sed -i "s/X86_64_MACOS_PLACEHOLDER/${X86_64_MACOS}/g" bit-pop.rb
          sed -i "s/X86_64_LINUX_PLACEHOLDER/${X86_64_LINUX}/g" bit-pop.rb

          cat bit-pop.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bit-pop.rb
          git commit -m "Update bit-pop to ${{ github.event.inputs.version }}" || echo "No changes to commit"
          git push

  release:
    name: Create release
    needs: [build, update-formula]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          TAG="v${VERSION}"

          # Create tag
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

          # Create release
          gh release create "$TAG" \
            --title "Bit-Pop ${VERSION}" \
            --notes "## What's New

          See [CHANGELOG.md](https://github.com/mladenpop-oss/bit-pop/blob/main/CHANGELOG.md#${VERSION}) for details.

          ## Binaries

          | Platform | File |
          |----------|------|
          | Linux x86_64 | bit-pop-x86_64-linux.tar.gz |
          | Windows x86_64 | bit-pop-x86_64-windows.zip |
          | macOS aarch64 (Apple Silicon) | bit-pop-aarch64-macos.tar.gz |
          | macOS x86_64 (Intel) | bit-pop-x86_64-macos.tar.gz |
          " \
            */*.{tar.gz,zip}
